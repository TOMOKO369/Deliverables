<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Portfolio</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container-highest": "#e5e7eb",
                    "secondary-fixed": "#e4e4e7",
                    "on-tertiary": "#000000",
                    "tertiary-container": "#f4f4f5",
                    "primary-container": "#f4f4f5",
                    "on-secondary-container": "#18181b",
                    "surface-container": "#f9fafb",
                    "outline": "#d4d4d8",
                    "secondary-container": "#f4f4f5",
                    "primary": "#000000",
                    "surface-tint": "#000000",
                    "on-primary-fixed": "#ffffff",
                    "surface": "#ffffff",
                    "surface-dim": "#f4f4f5",
                    "on-primary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-variant": "#f4f4f5",
                    "surface-container-low": "#fafafa",
                    "on-surface-variant": "#52525b",
                    "surface-container-high": "#e4e4e7",
                    "on-primary-container": "#000000",
                    "background": "#ffffff",
                    "on-background": "#000000",
                    "on-surface": "#000000",
                    "surface-bright": "#ffffff"
                },
                "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
                "spacing": {
                    "unit": "8px",
                    "gutter": "24px",
                    "margin-desktop": "64px",
                    "max-width": "1280px",
                    "margin-mobile": "16px"
                },
                "fontFamily": {
                    "headline-lg-mobile": ["Noto Sans JP", "sans-serif"],
                    "label-md": ["Inter", "sans-serif"],
                    "headline-lg": ["Noto Sans JP", "sans-serif"],
                    "display-lg": ["Noto Sans JP", "sans-serif"],
                    "body-md": ["Inter", "sans-serif"],
                    "headline-md": ["Noto Sans JP", "sans-serif"],
                    "body-lg": ["Inter", "sans-serif"]
                },
                "fontSize": {
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                }
            },
        },
    }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
        background-color: #ffffff;
        color: #000000;
        min-height: max(884px, 100dvh);
    }
    
    /* Iframe Thumbnail Styles integrated for the live preview feature */
    .iframe-thumbnail-wrapper {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .group:hover .iframe-thumbnail-wrapper {
      transform: scale(1.05);
    }

    .iframe-thumbnail-wrapper iframe {
      width: 400%;
      height: 400%;
      transform: scale(0.25);
      transform-origin: 0 0;
      border: none;
      pointer-events: none;
      background-color: #ffffff;
    }
</style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md overflow-x-hidden">

<header class="bg-surface dark:bg-surface-dim text-primary dark:text-primary-fixed-dim font-headline-md text-headline-md docked full-width top-0 border-b border-secondary-container dark:border-outline-variant flex justify-between items-center px-gutter w-full h-16 sticky z-50">
    <div class="flex items-center gap-4">
        <span class="material-symbols-outlined cursor-pointer active:scale-95 transition-transform" data-icon="menu">menu</span>
        <h1 class="font-headline-md text-headline-md text-primary font-bold">Portfolio</h1>
    </div>
    <div class="flex items-center gap-4">
        <div class="hidden md:flex gap-6">
            <a class="text-primary font-bold hover:text-surface-variant transition-colors" href="#">Gallery</a>
            <a class="text-on-surface-variant hover:text-primary transition-colors" href="#">Profile</a>
            <a class="text-on-surface-variant hover:text-primary transition-colors" href="#">Contact</a>
        </div>
        <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-outline-variant cursor-pointer active:scale-95 transition-transform">
            <span class="material-symbols-outlined text-on-surface-variant" data-icon="person">person</span>
        </div>
    </div>
</header>

<main class="flex-grow max-w-screen-max-width mx-auto w-full px-margin-mobile md:px-margin-desktop py-10">
    <section class="mb-12 text-center">
        <h2 class="font-display-lg text-display-lg mb-4 text-primary">Portfolio</h2>
        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">
            コード未経験からAIを相棒にして、ゼロから形にした「できた！」の記録。
        </p>
        
        <!-- シンプルな黒い区切り線 -->
        <div class="w-16 h-1 bg-primary mx-auto my-8"></div>
        
        <!-- Filter Navigation -->
        <div class="flex flex-wrap justify-center gap-3 mt-8 mb-4" id="filter-nav">
            <button class="filter-btn bg-primary text-white px-4 py-2 rounded-full font-bold text-sm transition-colors border border-primary" data-filter="all">すべて</button>
            <button class="filter-btn bg-surface text-primary border border-outline px-4 py-2 rounded-full font-bold text-sm hover:bg-primary hover:text-white transition-colors" data-filter="Webサイト">Webサイト</button>
            <button class="filter-btn bg-surface text-primary border border-outline px-4 py-2 rounded-full font-bold text-sm hover:bg-primary hover:text-white transition-colors" data-filter="拡張機能">拡張機能</button>
            <button class="filter-btn bg-surface text-primary border border-outline px-4 py-2 rounded-full font-bold text-sm hover:bg-primary hover:text-white transition-colors" data-filter="GAS">GAS</button>
            <button class="filter-btn bg-surface text-primary border border-outline px-4 py-2 rounded-full font-bold text-sm hover:bg-primary hover:text-white transition-colors" data-filter="音声ツール">音声・動画</button>
        </div>
    </section>

    <!-- Gallery Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="gallery-grid">
        <!-- JS generates cards here -->
    </div>

    <!-- Decorative Footer Accent -->
    <div class="mt-20 flex justify-center">
        <div class="text-center">
            <span class="material-symbols-outlined text-primary text-4xl mb-2" data-icon="auto_awesome">auto_awesome</span>
            <p class="font-headline-md text-headline-md text-primary">AIと歩む、新しい形</p>
        </div>
    </div>
</main>

<nav class="md:hidden fixed bottom-0 w-full z-50 rounded-t-xl bg-surface dark:bg-surface-dim border-t border-secondary-container shadow-lg flex justify-around items-center h-16 px-4">
    <div class="flex flex-col items-center justify-center bg-surface-container-highest text-primary rounded-xl px-4 py-1 active:scale-90 transition-transform">
        <span class="material-symbols-outlined" data-icon="explore">explore</span>
        <span class="font-label-md text-label-md">Gallery</span>
    </div>
    <div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform">
        <span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
        <span class="font-label-md text-label-md">Profile</span>
    </div>
    <div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform">
        <span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
        <span class="font-label-md text-label-md">More</span>
    </div>
</nav>

<script src="script.js"></script>
</body>
</html>
